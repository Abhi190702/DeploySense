<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background with slight rounded corners -->
  <rect width="32" height="32" rx="7" fill="#09090b"/>

  <!-- Hexagon border (brand accent) -->
  <polygon
    points="16,2 28,8.5 28,23.5 16,30 4,23.5 4,8.5"
    fill="none"
    stroke="#22d3ee"
    stroke-width="1.5"
    stroke-linejoin="round"
  />

  <!-- Inner hexagon subtle fill -->
  <polygon
    points="16,4.5 26,10.25 26,21.75 16,27.5 6,21.75 6,10.25"
    fill="#0d1117"
    opacity="0.6"
  />

  <!-- ECG / heartbeat pulse line through center -->
  <polyline
    points="4.5,16 9,16 10.5,11 12,21 13.5,13 15,19 16.5,16 23,16 27.5,16"
    fill="none"
    stroke="#22d3ee"
    stroke-width="1.6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Glow dot at peak -->
  <circle cx="13.5" cy="13" r="1.2" fill="#22d3ee" opacity="0.9"/>
</svg>
